apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: fluid-devops
  region: us-east-1
managedNodeGroups:
- name: fluid-workers
  instanceType: t3.medium
  desiredCapacity: 2
  minSize: 1
  maxSize: 3
  spot: true
  labels:
    role: worker
  tags:
    environment: demo
    project: fluid-devops-challenge